name: Release

# On every push to main: run the full CI suite, then let Python Semantic
# Release decide whether the accumulated Conventional Commits warrant a new
# version. If so, it bumps pyproject.toml + __init__.py, updates CHANGELOG.md,
# tags vX.Y.Z, publishes a GitHub Release with built artifacts, and (only on a
# real release) publishes the package to PyPI via Trusted Publishing.
on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    name: Semantic release
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Guard against releasing commits that landed while CI was running.
      - name: Pin branch to the workflow SHA
        run: git reset --hard ${{ github.sha }}

      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: "github-actions[bot]"
          git_committer_email: "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Upload artifacts to the GitHub Release
        uses: python-semantic-release/publish-action@310a9983a0ae878b29f3aac778d7c77c1db27378 # v10.5.3
        if: steps.release.outputs.released == 'true'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}

      # Hand the built sdist/wheel (created by build_command during the release
      # above) to the deploy job, which runs with PyPI publish privileges only.
      - name: Stash distribution for PyPI
        if: steps.release.outputs.released == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: distribution-artifacts
          path: dist
          if-no-files-found: error

  # Separate job so PyPI publishing runs with the *least* privilege (only an
  # OIDC id-token, no repo write), and can be retried without re-releasing.
  deploy:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'
    environment:
      name: pypi
      url: https://pypi.org/project/claude-agent-sync
    permissions:
      contents: read
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - name: Download distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: distribution-artifacts
          path: dist

      # Trusted Publishing — no API token needed. Register the publisher once at
      # https://pypi.org/manage/project/claude-agent-sync/settings/publishing/
      # (owner: denfry, repo: agent-sync, workflow: release.yml, environment: pypi).
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist
          print-hash: true
