version: 2
updates:
  # Keep GitHub Actions pinned versions current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    labels:
      - dependencies

  # Keep dev/build dependencies (pytest, ruff, build tooling) current.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: build
    labels:
      - dependencies
